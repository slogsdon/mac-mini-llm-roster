# Minimal LiteLLM proxy config showing the role-alias pattern.
#
# This is a sanitized version of what runs in front of the Ollama roster
# in the benchmarks under ../data/. My real config also runs OTel and
# Langfuse callbacks; both are omitted here because they're orthogonal
# to the routing.
#
# The whole idea: each alias is a config bundle. Model tag, context
# window, thinking setting, anything else that's per-model. Clients ask
# for the alias; the proxy applies the bundle. When a model needs to be
# swapped or its think setting flipped, it happens here, in one place,
# without touching any client.
#
# LiteLLM proxy docs: https://docs.litellm.ai/docs/simple_proxy

model_list:
  - model_name: code-autocomplete
    litellm_params:
      model: ollama/qwen2.5-coder:3b-base
      api_base: http://host.docker.internal:11434
      num_ctx: 32768

  - model_name: fast-general
    litellm_params:
      model: ollama_chat/gemma4:e4b-mlx
      api_base: http://host.docker.internal:11434
      num_ctx: 65536
      # gemma4's chat template has thinking baked in. If you don't force
      # it off you'll watch it burn an entire 16K budget on internal
      # monolog and return empty content. Force off so the alias
      # actually behaves "fast".
      think: false

  - model_name: code-review
    litellm_params:
      model: ollama_chat/granite4.1:8b
      api_base: http://host.docker.internal:11434
      num_ctx: 65536

  - model_name: general
    litellm_params:
      model: ollama_chat/qwen3.6:35b-mlx
      api_base: http://host.docker.internal:11434
      # 35B MLX MoE — doubles as the `vision` alias.
      num_ctx: 65536

  - model_name: writing
    litellm_params:
      model: ollama_chat/mistral-nemo:12b
      api_base: http://host.docker.internal:11434
      num_ctx: 131072

  - model_name: reasoning
    litellm_params:
      model: ollama_chat/phi4-reasoning:plus
      api_base: http://host.docker.internal:11434
      num_ctx: 32768
      # phi4-reasoning always emits <think>...</think> — there is no off
      # switch. Force think:true so Ollama parses the tags into the
      # thinking field instead of leaving them in the visible content.
      # Requires the stock Modelfile to be rebuilt to declare the
      # `thinking` capability; otherwise the parse doesn't happen.
      think: true

  - model_name: capable
    litellm_params:
      model: ollama_chat/qwen3:14b
      api_base: http://host.docker.internal:11434
      num_ctx: 40960

  # `efficient` (lfm2:24b) is the primary 20B-class default. It beat
  # `capable-large` (gpt-oss:20b) 6.8x on the same prompts in the speed
  # benchmark. Reach for `capable-large` only when you specifically want
  # gpt-oss's reasoning-channel chain-of-thought.
  - model_name: efficient
    litellm_params:
      model: ollama_chat/lfm2:24b
      api_base: http://host.docker.internal:11434
      num_ctx: 32768

  - model_name: capable-large
    litellm_params:
      model: ollama_chat/gpt-oss:20b
      api_base: http://host.docker.internal:11434
      num_ctx: 65536

  - model_name: vision
    litellm_params:
      model: ollama_chat/qwen3.6:35b-mlx
      api_base: http://host.docker.internal:11434
      # Same backing model as `general`. The two aliases are kept
      # distinct so vision-tagged traffic stays separable in Langfuse.
      num_ctx: 65536

  - model_name: instruct
    litellm_params:
      model: ollama_chat/ministral-3:14b
      api_base: http://host.docker.internal:11434
      num_ctx: 40960

  - model_name: tiny-reason
    litellm_params:
      model: ollama_chat/lfm2.5-thinking:1.2b
      api_base: http://host.docker.internal:11434
      num_ctx: 32768
      think: true

litellm_settings:
  drop_params: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
